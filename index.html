<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boter Kaas en Eieren</title>
  <link rel="stylesheet" href="css/style.css">

</head>
<body>
  <h1><i class="bi bi-controller me-2"></i>Boter Kaas en Eieren<i class="bi bi-controller ms-2"></i></h1>

  <div class="gamemode-selection">
    <h2>Kies een spelmodus:</h2>
<button class="gamemode-button" data-mode="player"> <i class="bi bi-people me-2" style="font-size:1.4em;"></i>Speler vs Speler</button>
<button class="gamemode-button" data-mode="computer"> <i class="bi bi-robot me-2" style="font-size:1.4em;"></i>Speler vs Computer</button>
  </div>

  <div class="player-names hidden">
    <label for="playerX"><i class="bi bi-person me-2"></i>Naam Speler X:</label>
    <input type="text" id="playerX" placeholder="Voer naam in Speler X">
    
    <label for="playerO"><i class="bi bi-person me-2"></i>Naam Speler O:</label>
    <input type="text" id="playerO" placeholder="Voer naam in Speler O">
    
    <button class="start-game-button"><i class="bi bi-play-fill me-2"></i>Start Game</button>
  </div>

  <div class="game-container hidden">
    <div class="scoreboard hidden">
      <p id="scoreboard-playerX"><i class="bi bi-circle-fill text-primary me-2"></i>Speler X: <span id="scoreX">0</span></p>
      <p id="scoreboard-playerO"><i class="bi bi-circle-fill text-danger me-2"></i>Speler O: <span id="scoreO">0</span></p>
    </div>

    <div class="board-wrapper">
      <svg id="winningLine" width="330" height="330" style="position: absolute; top: 0; left: 0;"></svg>
      <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
    </div>

    <div class="winner-message hidden">
      <p class="winner-text"></p>
      <button class="next-round-button hidden"><i class="bi bi-arrow-repeat me-2"></i>Volgende Ronde</button>
    </div>
  </div>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <script src="js/main.js"></script>
</body>
</html>
